<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Мероприятия — Дача 2004</title><link rel="stylesheet" href="assets/css/style.css"><link rel="icon" href="assets/img/logo.png"></head><body><script src="assets/js/app.js"></script><script>mount('events',`<section class="card section"><div class="section-title"><h2>Мероприятия</h2><button class="btn ghost small" onclick="addEvent()">Добавить</button></div><div id="eventList" class="event-list"></div></section><div id="modal" class="modal"><div class="card modal-card" id="modalBody"></div></div>`);function draw(){eventList.innerHTML=events().map((e,i)=>`<div class="event"><div><div class="event-cover" style="--wall:url('assets/img/wallpapers/${e.cover||'cosmos.svg'}')"></div><h3>${e.title}</h3><p class="muted">${e.date} · ${e.place}</p><p>${e.desc}</p></div><div class="row"><button class="btn" onclick="showEvent(${i})">Подробнее</button><button class="btn ghost" onclick="delEvent(${i})">Удалить</button></div></div>`).join('')}function addEvent(){let title=prompt('Название мероприятия');if(!title)return;let date=prompt('Дата YYYY-MM-DD','2026-06-01')||'';let place=prompt('Место','Дача')||'';let desc=prompt('Описание','')||'';let e=events();e.push({title,date,place,desc,cover:'aurora.svg'});set('d4_events',e);draw()}function delEvent(i){if(confirm('Удалить мероприятие?')){let e=events();e.splice(i,1);set('d4_events',e);draw()}}draw()</script></body></html>
