<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Настройки — Дача 2004</title><link rel="stylesheet" href="assets/css/style.css"><link rel="icon" href="assets/img/logo.png"></head><body><script src="assets/js/app.js"></script><script>mount('settings',`<section class="card section"><div class="section-title"><h2>Настройки</h2><button class="btn ghost small" onclick="resetIntro()">Сбросить интро</button></div><div class="row"><button class="btn" onclick="notify('Дача 2004','Тестовое уведомление')">Тест уведомления</button><button class="btn ghost" onclick="toggleAnim()">Вкл/выкл анимацию</button></div></section><section class="card section"><h2>Обои</h2><p class="muted">Выбери фон. Анимация включается отдельной кнопкой.</p><div id="walls" class="wall-grid"></div></section>`);function drawWalls(){walls.innerHTML=WALLS.map(w=>`<div class="wall" style="background-image:url('assets/img/wallpapers/${w[0]}')" onclick="setWall('${w[0]}')"><b>${w[1]}</b></div>`).join('')}function setWall(w){let s=get('d4_settings',{wall:'cosmos.svg',animated:true,blur:0});s.wall=w;set('d4_settings',s);applySettings()}window.setWall=setWall;function toggleAnim(){let s=get('d4_settings',{wall:'cosmos.svg',animated:true,blur:0});s.animated=!s.animated;set('d4_settings',s);applySettings()}window.toggleAnim=toggleAnim;drawWalls()</script></body></html>
