<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Главная — Дача 2004</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="assets/css/style.css"><link rel="icon" href="assets/img/logo.png"></head><body><script src="assets/js/app.js"></script><script>mount('home',`<section class="hero"><div class="card hero-main"><div class="muted">закрытый сайт группы</div><h2>Дача 2004</h2><p class="muted">Профили, чат в стиле Telegram, стикеры, галерея, мероприятия, дни рождения и установка как веб-приложение.</p><div class="row"><a class="btn" href="chat.html">Открыть чат</a><a class="btn ghost" href="profile.html">Мой профиль</a><a class="btn ghost" href="settings.html">Настройки</a></div></div><div class="card birthday-card"><div class="section-title"><h2>Ближайший ДР</h2><span>🎂</span></div><div id="bd"></div></div></section><section class="card section"><div class="section-title"><h2>Ближайшие мероприятия</h2><a class="btn ghost small" href="events.html">Все</a></div><div id="evs" class="event-list"></div></section><section class="grid"><a class="tile" href="chat.html"><div class="icon">💬</div><h3>Чат</h3><p class="muted">Стикеры, смайлики, звук и уведомления.</p></a><a class="tile" href="gallery.html"><div class="icon">🖼️</div><h3>Галерея</h3><p class="muted">Фото, превью, просмотр и добавление локально.</p></a><a class="tile" href="settings.html"><div class="icon">🎨</div><h3>Обои</h3><p class="muted">Статические и анимированные фоны.</p></a></section><div id="modal" class="modal"><div class="card modal-card" id="modalBody"></div></div>`);let b=nearestBirthday();let u=users()[b?.login]||{};$('#bd').innerHTML=b?`<a class="bd-user" href="profile.html"><img src="${avatar(u)}"><div><h3>${b.name}</h3><p class="muted">${b.date} · через ${b.days} дн.</p></div></a>`:'<p class="muted">Нет данных</p>';$('#evs').innerHTML=events().slice(0,3).map((e,i)=>`<div class="event"><div><div class="event-cover" style="--wall:url('assets/img/wallpapers/${e.cover||'cosmos.svg'}')"></div><h3>${e.title}</h3><p class="muted">${e.date} · ${e.place}</p></div><button class="btn ghost" onclick="showEvent(${i})">Подробнее</button></div>`).join('')</script></body></html>
