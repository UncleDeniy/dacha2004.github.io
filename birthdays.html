<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Дни рождения — Дача 2004</title><link rel="stylesheet" href="assets/css/style.css"><link rel="icon" href="assets/img/logo.png"></head><body><script src="assets/js/app.js"></script><script>mount('birthdays',`<section class="card section"><div class="section-title"><h2>Дни рождения</h2><a class="btn ghost small" href="profile.html">Изменить свой</a></div><div id="bdlist" class="event-list"></div></section>`);bdlist.innerHTML=birthdays().map(b=>{let u=users()[b.login]||{};return `<a class="event" href="profile.html"><div class="bd-user"><img src="${avatar(u)}"><div><h3>${b.name}</h3><p class="muted">${b.date}</p></div></div><span>🎂</span></a>`}).join('')</script></body></html>
