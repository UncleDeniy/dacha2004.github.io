<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Чат — Дача 2004</title><link rel="stylesheet" href="assets/css/style.css"><link rel="icon" href="assets/img/logo.png"></head><body class="chat-page"><audio id="notifySound" src="assets/sounds/notify.wav"></audio><script src="assets/js/app.js"></script><script src="assets/js/chat.js"></script><script>mount('chat',`<section class="card chat-wrap"><div class="chat-main"><div class="chat-head"><a class="chat-title" href="profile.html"><img data-avatar><div><h2 style="margin:0">Общий чат</h2><div class="muted">локальный чат · стикеры · звук · уведомления</div></div></a><button class="btn ghost small" onclick="clearChat()">Очистить</button></div><div id="messages" class="messages"></div><div class="compose"><button class="round" onclick="togglePicker()">☺</button><textarea id="msgInput" placeholder="Сообщение..."></textarea><button class="round" onclick="sendMessage()">➤</button><div id="picker" class="picker"></div></div></div><aside class="chat-side"><h3>Участники</h3><a class="mini" href="profile.html"><img class="ava" data-avatar><div><b data-name></b><div class="muted">онлайн</div></div></a><h3>Быстрые стикеры</h3><div class="sticker-grid">${['😂','😎','🔥','🥳','🍌','💀','👻','❤️‍🔥','🎉','🛸','🐸','💎'].map(s=>`<button onclick="sendMessage('sticker','${s}')">${s}</button>`).join('')}</div></aside></section>`);applyUser();bootChat()</script></body></html>
