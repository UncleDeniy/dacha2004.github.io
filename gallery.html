<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Галерея — Дача 2004</title><link rel="stylesheet" href="assets/css/style.css"><link rel="icon" href="assets/img/logo.png"></head><body><script src="assets/js/app.js"></script><script>mount('gallery',`<section class="card section"><div class="section-title"><h2>Галерея</h2><button class="btn ghost small" onclick="clearGallery()">Очистить</button></div><div class="gallery-tools"><input class="input" id="search" placeholder="Поиск по названию" oninput="drawGallery()"><label class="btn ghost small">Добавить фото<input id="photoInput" type="file" accept="image/*" hidden onchange="addPhoto(event)"></label></div><div id="gal" class="gallery"></div></section><div id="modal" class="modal"><div class="card modal-card" id="modalBody"></div></div>`);function drawGallery(){let q=($('#search')?.value||'').toLowerCase();gal.innerHTML=gallery().filter(x=>x.title.toLowerCase().includes(q)).map((p,i)=>`<div class="photo" onclick="openPhoto(${i})"><img src="${p.src}"><span>${p.title}</span></div>`).join('')}function addPhoto(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{let g=gallery();g.unshift({title:f.name.replace(/\.[^.]+$/,''),src:r.result});set('d4_gallery',g);drawGallery()};r.readAsDataURL(f)}function openPhoto(i){let p=gallery()[i];modal.classList.add('show');modalBody.innerHTML=`<img src="${p.src}" style="width:100%;border-radius:22px;max-height:70dvh;object-fit:contain;background:#000"><h2>${p.title}</h2><div class="row"><button class="btn ghost" onclick="modal.classList.remove('show')">Закрыть</button></div>`}function clearGallery(){if(confirm('Очистить локальную галерею?')){localStorage.removeItem('d4_gallery');drawGallery()}}drawGallery()</script></body></html>
