<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Профиль — Дача 2004</title><link rel="stylesheet" href="assets/css/style.css"><link rel="icon" href="assets/img/logo.png"></head><body><script src="assets/js/app.js"></script><script>mount('profile',`<section class="profile"><div class="card section avatar-editor"><h2>Аватарка</h2><div class="avatar-stage"><img id="avaPreview" data-avatar></div><label class="btn ghost">Загрузить<input type="file" accept="image/*" hidden onchange="loadAvatar(event)"></label><label class="muted">Масштаб<input id="zoom" type="range" min="1" max="2" step="0.05" value="1" oninput="avatarZoom()"></label><label class="muted">Поворот<input id="rot" type="range" min="-25" max="25" step="1" value="0" oninput="avatarZoom()"></label><button class="btn" onclick="saveAvatarEdit()">Сохранить</button></div><div class="card section"><div class="section-title"><h2>Мой профиль</h2><button class="btn ghost small" onclick="logout()">Выйти</button></div><div class="form"><input class="input" id="name" placeholder="Ник"><input class="input" id="fio" placeholder="ФИО"><input class="input" id="birthday" type="date"><textarea id="bio" placeholder="О себе"></textarea><button class="btn" onclick="saveProfile()">Сохранить профиль</button></div></div></section>`);let u=me();name.value=u.name||cur();fio.value=u.fio||'';birthday.value=u.birthday||'';bio.value=u.bio||'';let tempAvatar=null;function loadAvatar(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{tempAvatar=r.result;avaPreview.src=tempAvatar};r.readAsDataURL(f)}window.loadAvatar=loadAvatar;function avatarZoom(){avaPreview.style.setProperty('--zoom',zoom.value);avaPreview.style.setProperty('--rot',rot.value+'deg')}window.avatarZoom=avatarZoom;function saveAvatarEdit(){let us=users();if(tempAvatar)us[cur()].avatar=tempAvatar;set('d4_users',us);applyUser();alert('Аватарка сохранена')}window.saveAvatarEdit=saveAvatarEdit;function saveProfile(){let us=users();us[cur()]={...us[cur()],name:name.value||cur(),fio:fio.value,birthday:birthday.value,bio:bio.value};set('d4_users',us);let bd=birthdays().filter(x=>x.login!==cur());bd.push({login:cur(),name:name.value||cur(),date:birthday.value||'2004-01-01'});set('d4_birthdays',bd);applyUser();alert('Профиль сохранен')}window.saveProfile=saveProfile</script></body></html>
